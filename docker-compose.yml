version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: dms-postgres
    environment:
      POSTGRES_USER: dms_user
      POSTGRES_PASSWORD: dms_password
      POSTGRES_DB: dms_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dms-network

  # Application
  app:
    build: .
    container_name: dms-app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://dms_user:dms_password@postgres:5432/dms_db
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=your-secret-key-change-this-in-production
    depends_on:
      - postgres
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - dms-network
    command: npm run dev

volumes:
  postgres_data:

networks:
  dms-network:
    driver: bridge
